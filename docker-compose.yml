services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "127.0.0.1:8443:8443"
    environment:
      SESSIONS_DIR: /data/sessions
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MODELS_DIR: /models
      TLS_CERT_FILE: /data/certs/dev-cert.pem
      TLS_KEY_FILE: /data/certs/dev-key.pem
      SERVER_PORT: 8443
      TLS_ENABLED: "true"
      TLS_AUTO_GENERATE_SELF_SIGNED: "true"
      TLS_CERT_COMMON_NAME: localhost
    volumes:
      - ${HOST_SESSIONS_DIR:-./data/sessions}:/data/sessions
      - certs-data:/data/certs
      - ${HOST_MODELS_DIR:-./models}:/models:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    environment:
      SESSIONS_DIR: /data/sessions
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MODELS_DIR: /models
      HF_HOME: /models
      HUGGINGFACE_HUB_CACHE: /models
      TRANSFORMERS_CACHE: /models
      TLS_ENABLED: "false"
      # --- GPU configuration ---
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cuda}
      WHISPER_STRICT_CUDA: ${WHISPER_STRICT_CUDA:-1}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-float16}
      WHISPER_COMPUTE_TYPE_FALLBACKS: ${WHISPER_COMPUTE_TYPE_FALLBACKS:-int8_float16,int8}
      CUDA_DEVICE_INDEX: ${CUDA_DEVICE_INDEX:-0}
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True,max_split_size_mb:512
      # --- Reconciliation LLM ---
      RECONCILIATION_MODEL_PATH: ${RECONCILIATION_MODEL_PATH:-}
      RECONCILIATION_N_GPU_LAYERS: ${RECONCILIATION_N_GPU_LAYERS:-28}
    volumes:
      - ${HOST_SESSIONS_DIR:-./data/sessions}:/data/sessions
      - ${HOST_MODELS_DIR:-./models}:/models:ro
    runtime: nvidia
    shm_size: '2gb'
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:
  certs-data:
